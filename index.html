<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Collections — Exerciții Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="hero">
  <h1>Java <span>Collections</span> — Exerciții</h1>
  <p><span id="hero-count">0</span> exerciții practice pe List, Set, Queue/Deque, Map și probleme mixte.</p>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--list)"></div>List</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--set)"></div>Set</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--que)"></div>Queue / Deque</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--map)"></div>Map</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--mix)"></div>Mixt</div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-cat="all">Toate</button>
  <button class="tab-btn" data-cat="list">List</button>
  <button class="tab-btn" data-cat="set">Set</button>
  <button class="tab-btn" data-cat="queue">Queue</button>
  <button class="tab-btn" data-cat="map">Map</button>
  <button class="tab-btn" data-cat="mixed">Mixt</button>
</div>

<div class="container" id="exercises">
  <p id="loading-state">Se încarcă exercițiile...</p>
</div>

<div class="score-bar">
  <span>Exerciții: <strong id="total-count">0</strong></span>
  <span>|</span>
  <span>Rezolvate: <strong id="solved-count">0</strong></span>
</div>

<script src="script.js"></script>
</body>
</html>
